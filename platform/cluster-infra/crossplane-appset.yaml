apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: crossplane
  namespace: argocd
  labels:
    app.kubernetes.io/name: crossplane-appset
spec:
  generators:
    - git:
        repoURL: https://github.com/Reed-Schimmel/enterprise-ai-platform.git
        revision: openwebui
        files:
          - path: configurations/**/cluster-infra/crossplane-config.yaml
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  template:
    metadata:
      name: '{{ index .path.segments 2 }}-crossplane'
      labels:
        app.kubernetes.io/name: crossplane
    spec:
      project: default
      source:
        repoURL: https://charts.crossplane.io/stable
        targetRevision: '{{ .targetRevision }}'
        chart: crossplane
        helm:
          releaseName: crossplane
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true