apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: vault
  namespace: argocd
  labels:
    app.kubernetes.io/name: vault-appset
spec:
  generators:
    - git:
        repoURL: https://github.com/Reed-Schimmel/enterprise-ai-platform.git
        revision: main
        files:
          - path: configurations/**/cluster-infra/vault-config.yaml
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  template:
    metadata:
      name: '{{ index .path.segments 2 }}-vault'
      labels:
        app.kubernetes.io/name: vault
    spec:
      ignoreDifferences:
        - group: admissionregistration.k8s.io
          kind: MutatingWebhookConfiguration
          name: vault-agent-injector-cfg
          jqPathExpressions:
            - .webhooks[].clientConfig.caBundle
      project: default
      source:
        repoURL: https://github.com/Reed-Schimmel/enterprise-ai-platform.git
        targetRevision: main
        path: apps/vault
        helm:
          releaseName: vault
          values: |
            {{- if .values }}
            vault:
              {{- toYaml .values | nindent 14 }}
            {{- end }}
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
