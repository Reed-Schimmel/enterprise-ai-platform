apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  resource.customizations.health.argoproj.io_Application: |
    hs = {}
    hs.status = "Progressing"
    hs.message = ""
    if obj.status ~= nil then
      if obj.status.health ~= nil then
        hs.status = obj.status.health.status
        if obj.status.health.message ~= nil then
          hs.message = obj.status.health.message
        end
      end
    end
    return hs
  resource.customizations.health.argoproj.io_ApplicationSet: |
    hs = {}
    hs.status = "Progressing"
    hs.message = ""
    if obj.status ~= nil then
      if obj.status.conditions ~= nil then
        for i, condition in ipairs(obj.status.conditions) do
          if condition.type == "ErrorOccurred" and condition.status == "True" then
            hs.status = "Degraded"
            hs.message = condition.message
            return hs
          end
        end
      end
      if obj.status.resources ~= nil then
        local allHealthy = true
        local allSynced = true
        for i, res in ipairs(obj.status.resources) do
          if res.health ~= nil and res.health.status ~= "Healthy" then
            allHealthy = false
            hs.message = "App " .. res.name .. " is " .. res.health.status
          end
          if res.status ~= nil and res.status ~= "Synced" then
            allSynced = false
            if hs.message == "" then
              hs.message = "App " .. res.name .. " is " .. res.status
            end
          end
        end
        if allHealthy and allSynced then
          hs.status = "Healthy"
          hs.message = "All Applications are Healthy and Synced"
        end
      else
        local isUpToDate = false
        if obj.status.conditions ~= nil then
          for i, condition in ipairs(obj.status.conditions) do
            if condition.type == "ResourcesUpToDate" and condition.status == "True" then
              isUpToDate = true
            end
          end
        end
        if isUpToDate then
          hs.status = "Healthy"
          hs.message = "No Applications generated"
        else
          hs.status = "Progressing"
          hs.message = "Waiting for Applications to be generated"
        end
      end
    end
    return hs
