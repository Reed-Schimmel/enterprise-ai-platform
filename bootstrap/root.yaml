apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-appsets
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/Reed-Schimmel/enterprise-ai-platform.git
      targetRevision: app-seps
      path: platform-appsets
      helm:
        valueFiles:
          - $values/configurations/kind/kind-enterprise-ai/platform-values.yaml
    - repoURL: https://github.com/Reed-Schimmel/enterprise-ai-platform.git
      targetRevision: app-seps
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
