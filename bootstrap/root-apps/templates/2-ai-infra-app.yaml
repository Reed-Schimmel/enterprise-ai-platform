apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-infra
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/Reed-Schimmel/enterprise-ai-platform.git
    targetRevision: app-seps
    path: platform/ai-infra
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
