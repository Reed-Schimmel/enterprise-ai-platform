apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-appsets
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: 'https://github.com/Reed-Schimmel/enterprise-ai-platform.git'
      targetRevision: main
      path: platform-appsets
      helm:
        valueFiles:
          - $values/configurations/kind-enterprise-ai/platform-values.yaml
    - repoURL: 'https://github.com/Reed-Schimmel/enterprise-ai-platform.git'
      targetRevision: main
      ref: values
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
