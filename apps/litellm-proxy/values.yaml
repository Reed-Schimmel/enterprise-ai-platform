# https://github.com/BerriAI/litellm/blob/main/deploy/charts/litellm-helm/values.yaml
litellm-helm:
  global:
    imagePullSecrets:
      - name: docker-image-pull-secret
  image:
    # Use "ghcr.io/berriai/litellm-database" for optimized image with database
    repository: ghcr.io/berriai/litellm-non_root # Required to run as non-root
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    # https://github.com/berriai/litellm/pkgs/container/litellm-non_root/592203661?tag=main-v1.80.7-nightly
    tag: "main-v1.80.7-nightly"

  nameOverride: "litellm"
  fullnameOverride: ""

  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Automatically mount a ServiceAccount's API credentials?
    automount: true
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: "litellm-proxy"

  # annotations for litellm deployment
  deploymentAnnotations: {}
  # annotations for litellm pods
  podAnnotations: {}
  podLabels: {}

  # At the time of writing, the litellm docker image requires write access to the
  #  filesystem on startup so that prisma can install some dependencies.
  podSecurityContext:
    fsGroup: 1000
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000

  # A list of Kubernetes Secret objects that will be exported to the LiteLLM proxy
  #  pod as environment variables.  These secrets can then be referenced in the
  #  configuration file (or "litellm" ConfigMap) with `os.environ/<Env Var Name>`
  environmentSecrets:
    - litellm-proxy-dbcredentials
    - litellm-proxy-api-keys

  # A list of Kubernetes ConfigMap objects that will be exported to the LiteLLM proxy
  #  pod as environment variables.  The ConfigMap kv-pairs can then be referenced in the
  #  configuration file (or "litellm" ConfigMap) with `os.environ/<Env Var Name>`
  environmentConfigMaps: []
    # - litellm-env-configmap

  proxyConfigMap:
    # when true, creates a new configmap
    create: true
    # if create is false and name is set, use existing ConfigMap
    # create: false
    # name: ""
    # key: "config.yaml"

  # The elements within proxy_config are rendered as config.yaml for the proxy
  #  Examples: https://github.com/BerriAI/litellm/tree/main/litellm/proxy/example_config_yaml
  #  Reference: https://docs.litellm.ai/docs/proxy/configs
  proxy_config:
    litellm_settings:
      drop_params: true # drop unsupported params instead of throwing an error.
      # callbacks:
      #   - prometheus
    model_list:
      # At least one model must exist for the proxy to start.
      - model_name: fake-openai-endpoint
        litellm_params:
          model: openai/fake
          api_key: fake-key
          api_base: https://api.openai.com/v1
      - model_name: gemini-pro-3.1
        litellm_params:
          model: gemini/gemini-3.1-pro-preview
          api_key: os.environ/GEMINI_API_KEY

    general_settings:
      master_key: os.environ/PROXY_MASTER_KEY
      # store_model_in_db: true
      # store_prompts_in_spend_logs: true

  # Prisma migration job settings
  migrationJob:
    # Enable or disable the schema migration Job
    # TODO: make false for dev and true for prod
    enabled: false