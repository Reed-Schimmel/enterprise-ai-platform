apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: litellm-api-keys
spec:
  refreshInterval: "1m"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: litellm-proxy-api-keys
    creationPolicy: Owner
  data:
  - secretKey: OPENAI_API_KEY
    remoteRef:
      key: litellm/api-keys
      property: OPENAI_API_KEY
